services:
  chamber:
    build: .
    ports:
      - "${CHAMBER_PORT:-3002}:3000"
    environment:
      LOOPER_DATA_DIR: /data
      LOOPER_CAPACITY: ${LOOPER_CAPACITY:-16}
      GATE_CODE: ${GATE_CODE:-333333}
      DEMO_PUBLIC: ${DEMO_PUBLIC:-0}
      NEXT_PUBLIC_DEMO_PUBLIC: ${NEXT_PUBLIC_DEMO_PUBLIC:-0}
    volumes:
      - chamber-data:/data
    restart: unless-stopped

volumes:
  chamber-data: